  - "@sentry/core@10.62.0"
  - "@sentry/feedback@10.62.0"
  - "@sentry/replay-canvas@10.62.0"
  - "@sentry/replay@10.62.0"
  - js-yaml
  - stylelint@17.14.0
  - '@iconify-json/lucide@1.2.115'
  - virtua@0.49.2
