overrides:
  "@vitejs/plugin-vue": "^6.0.7"
  # @astrojs/language-server 2.16.11 is the latest published version but still
  # crashes under TypeScript 7 (see `pnpm typechecking:vue-astro` / CLAUDE.md's
  # "TypeScript 7" section) — kept here so a fixed release gets picked up
  # automatically on `pnpm install`.
  "@astrojs/language-server": "^2.16.11"

allowBuilds:
  "@infisical/cli": true
  "@parcel/watcher": true
  "@sentry/cli": true
  esbuild: true
  sharp: true
  workerd: true

minimumReleaseAgeExclude:
  - "@felix_berlin/*"
  - astro-breadcrumbs
  - astro-matomo
  - "@astrojs/markdown-satteri@0.3.1"
  - "@astrojs/vue@7.0.0 || 7.0.1"
  - astro@7.0.0 || 7.0.3
  - "@sentry/browser-utils@10.62.0"
  - "@sentry/browser@10.62.0"
  - "@sentry/core@10.62.0"
  - "@sentry/feedback@10.62.0"
  - "@sentry/replay-canvas@10.62.0"
  - "@sentry/replay@10.62.0"
  - js-yaml
  - stylelint@17.14.0
  - "@iconify-json/lucide@1.2.115"
  - virtua@0.49.2
